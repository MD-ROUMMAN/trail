<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - For You, My Love 💖</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #08111f 0%, #1a1b2e 100%);
      color: #00f7ff;
      min-height: 100vh;
      padding: 20px;
    }

    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Header */
    .admin-header {
      background: linear-gradient(135deg, rgba(0, 247, 255, 0.1), rgba(255, 0, 106, 0.1));
      border: 2px solid #00f7ff;
      border-radius: 15px;
      padding: 30px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 0 30px rgba(0, 247, 255, 0.2);
      backdrop-filter: blur(10px);
    }

    .admin-title h1 {
      font-size: 32px;
      color: #00f7ff;
      text-shadow: 0 0 10px #00f7ff;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .admin-title h1 i {
      color: #ff006a;
      text-shadow: 0 0 10px #ff006a;
    }

    .logout-btn {
      background: linear-gradient(135deg, #ff006a, #ff3385);
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
      box-shadow: 0 0 20px rgba(255, 0, 106, 0.4);
      text-transform: uppercase;
      font-size: 14px;
    }

    .logout-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(255, 0, 106, 0.6);
    }

    /* Stats */
    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: linear-gradient(135deg, rgba(0, 247, 255, 0.05), rgba(255, 0, 106, 0.05));
      border: 2px solid;
      border-radius: 12px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      transition: 0.3s;
    }

    .stat-card:hover {
      transform: translateY(-5px);
    }

    .stat-card.pending {
      border-color: #f093fb;
    }

    .stat-card.approved {
      border-color: #00f7ff;
    }

    .stat-card.rejected {
      border-color: #ff006a;
    }

    .stat-icon {
      font-size: 40px;
      margin-bottom: 15px;
    }

    .stat-card.pending .stat-icon {
      color: #f093fb;
      text-shadow: 0 0 10px #f093fb;
    }

    .stat-card.approved .stat-icon {
      color: #00f7ff;
      text-shadow: 0 0 10px #00f7ff;
    }

    .stat-card.rejected .stat-icon {
      color: #ff006a;
      text-shadow: 0 0 10px #ff006a;
    }

    .stat-info h3 {
      color: #ccc;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .stat-info p {
      font-size: 40px;
      font-weight: bold;
      color: #00f7ff;
      text-shadow: 0 0 10px #00f7ff;
    }

    /* Sections */
    .admin-section {
      background: linear-gradient(135deg, rgba(0, 247, 255, 0.05), rgba(255, 0, 106, 0.05));
      border: 2px solid #00f7ff;
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 30px;
      box-shadow: 0 0 20px rgba(0, 247, 255, 0.1);
    }

    .admin-section h2 {
      color: #00f7ff;
      margin-bottom: 25px;
      font-size: 22px;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #00f7ff;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .admin-section h2 i {
      color: #ff006a;
    }

    .empty-message {
      text-align: center;
      color: #888;
      padding: 40px 20px;
      font-size: 16px;
    }

    /* Signups Grid */
    .signups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .signup-card {
      background: linear-gradient(135deg, rgba(255, 0, 106, 0.1), rgba(240, 147, 251, 0.1));
      border: 2px solid #ff006a;
      border-radius: 10px;
      padding: 20px;
      transition: 0.3s;
    }

    .signup-card:hover {
      box-shadow: 0 0 25px rgba(255, 0, 106, 0.3);
      transform: translateY(-3px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .card-header h3 {
      color: #00f7ff;
      font-size: 18px;
    }

    .status {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status.pending {
      background: rgba(240, 147, 251, 0.3);
      color: #f093fb;
      border: 1px solid #f093fb;
    }

    .card-content {
      margin-bottom: 15px;
    }

    .card-content p {
      color: #aaa;
      font-size: 13px;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .card-content strong {
      color: #00f7ff;
    }

    .card-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-approve {
      background: linear-gradient(135deg, #00f7ff, #00d9ff);
      color: #111;
      box-shadow: 0 0 15px rgba(0, 247, 255, 0.3);
    }

    .btn-approve:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(0, 247, 255, 0.5);
    }

    .btn-reject {
      background: linear-gradient(135deg, #ff006a, #ff3385);
      color: white;
      box-shadow: 0 0 15px rgba(255, 0, 106, 0.3);
    }

    .btn-reject:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(255, 0, 106, 0.5);
    }

    .btn-small {
      flex: none;
      padding: 8px 12px;
      font-size: 12px;
    }

    /* Users List */
    .users-list {
      display: grid;
      gap: 15px;
    }

    .user-card {
      background: linear-gradient(135deg, rgba(0, 247, 255, 0.05), rgba(240, 147, 251, 0.05));
      padding: 20px;
      border-radius: 10px;
      border-left: 4px solid #00f7ff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.3s;
    }

    .user-card.rejected {
      border-left-color: #ff006a;
    }

    .user-card:hover {
      box-shadow: 0 0 20px rgba(0, 247, 255, 0.2);
      transform: translateX(5px);
    }

    .user-info h4 {
      color: #00f7ff;
      font-size: 16px;
      margin-bottom: 8px;
    }

    .user-info p {
      color: #aaa;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .username-badge {
      background: linear-gradient(135deg, #ff006a, #ff3385);
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      display: inline-block;
      box-shadow: 0 0 10px rgba(255, 0, 106, 0.3);
    }

    .reject-reason {
      background: rgba(255, 0, 106, 0.2) !important;
      color: #ff6b9d !important;
      padding: 8px;
      border-radius: 5px;
      margin-top: 8px;
      font-size: 12px;
      border: 1px solid #ff006a;
    }

    .user-actions {
      display: flex;
      gap: 10px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .admin-header {
        flex-direction: column;
        gap: 20px;
        text-align: center;
      }

      .admin-title h1 {
        font-size: 24px;
      }

      .admin-stats {
        grid-template-columns: 1fr;
      }

      .signups-grid {
        grid-template-columns: 1fr;
      }

      .user-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }

      .user-actions {
        width: 100%;
      }

      .user-actions .btn {
        flex: 1;
      }

      .card-actions {
        flex-direction: column;
      }

      .card-actions .btn {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <!-- Header -->
    <div class="admin-header">
      <div class="admin-title">
        <h1><i class="fas fa-crown"></i> Admin Dashboard</h1>
      </div>
      <button class="logout-btn" onclick="handleAdminLogout()">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>

    <!-- Stats -->
    <div class="admin-stats">
      <div class="stat-card pending">
        <div class="stat-icon">
          <i class="fas fa-hourglass-half"></i>
        </div>
        <div class="stat-info">
          <h3>Pending Approvals</h3>
          <p id="pendingCount">0</p>
        </div>
      </div>

      <div class="stat-card approved">
        <div class="stat-icon">
          <i class="fas fa-check-circle"></i>
        </div>
        <div class="stat-info">
          <h3>Approved Users</h3>
          <p id="approvedCount">0</p>
        </div>
      </div>

      <div class="stat-card rejected">
        <div class="stat-icon">
          <i class="fas fa-times-circle"></i>
        </div>
        <div class="stat-info">
          <h3>Rejected Users</h3>
          <p id="rejectedCount">0</p>
        </div>
      </div>
    </div>

    <!-- Pending Signups -->
    <div class="admin-section">
      <h2><i class="fas fa-inbox"></i> Pending Signups</h2>
      <div id="pendingSignups" class="signups-grid">
        <p class="empty-message">No pending signups</p>
      </div>
    </div>

    <!-- Approved Users -->
    <div class="admin-section">
      <h2><i class="fas fa-users-cog"></i> Approved Users</h2>
      <div id="approvedUsers" class="users-list">
        <p class="empty-message">No approved users</p>
      </div>
    </div>

    <!-- Rejected Users -->
    <div class="admin-section">
      <h2><i class="fas fa-ban"></i> Rejected Users</h2>
      <div id="rejectedUsers" class="users-list">
        <p class="empty-message">No rejected users</p>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
